function Check({ size = 22, color = GREEN, stroke = 3, style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={style}>
      <path d="M4 13l5 5L20 5" />
    </svg>
  );
}
function Wordmark({ scale = 1, onDark }) {
  const s = 22 * scale;
  return (
    <span style={{ fontFamily: "Poppins, sans-serif", fontWeight: 700, fontSize: 20 * scale, display: "inline-flex", alignItems: "center", color: onDark ? "#fff" : GRAY }}>
      Re<Check size={s} stroke={3.4} />is.<span style={{ color: GREEN }}>AI</span>
    </span>
  );
}

function cloneDoc(doc) {
  return {
    ...doc,
    meta: doc.meta.map(([label, value]) => [label, value]),
    sections: doc.sections.map((section) => ({
      ...section,
      body: section.body.map((part) => ({ ...part })),
    })),
  };
}
function makeSeedCorrections() {
  return SEED_CORR.map((c) => ({ ...c, status: "pending" }));
}
function cloneCorrections(corrections) {
  return corrections.map((c) => ({ ...c }));
}
function cloneFields(fields) {
  return fields.map((f) => ({ ...f }));
}
function makeDocumentRecord(seed) {
  return {
    ...seed,
    doc: cloneDoc(seed.doc),
    fields: cloneFields(seed.fields),
    corrections: seed.corrections.map((c) => ({ ...c, status: c.status || "pending" })),
    exported: false,
  };
}
function makeDocumentRecords() {
  return DOCUMENT_FIXTURES.map(makeDocumentRecord);
}
function getRecordStatus(record) {
  if (record.exported) return "Exportado";
  return record.corrections.some((c) => c.status === "pending") ? "Pendente" : "Revisado";
}

function IconBtn({ children, onClick, hover = "rgba(255,255,255,.1)" }) {
  return (
    <button onClick={onClick}
      style={{ width: 34, height: 34, borderRadius: 8, border: "none", background: "transparent", cursor: "pointer", display: "grid", placeItems: "center" }}
      onMouseEnter={(e) => (e.currentTarget.style.background = hover)}
      onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
      {children}
    </button>
  );
}

function RevisAI() {
  const [dark, setDark] = useState(false);
  const [extensionOpen, setExtensionOpen] = useState(true);
  const [sidebar, setSidebar] = useState(true);
  const [screen, setScreen] = useState("check");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [authOpen, setAuthOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [authMode, setAuthMode] = useState("login");
  const [authErr, setAuthErr] = useState("");
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [documentRecords, setDocumentRecords] = useState(makeDocumentRecords);
  const [activeDocId, setActiveDocId] = useState(1);
  const [fields, setFields] = useState(SEED_FIELDS);
  const [doc, setDoc] = useState(() => cloneDoc(BACKGROUND_DOC));
  const [corr, setCorr] = useState(makeSeedCorrections);
  const [editDraft, setEditDraft] = useState(() => cloneDoc(BACKGROUND_DOC));
  const [editDraftCorr, setEditDraftCorr] = useState(makeSeedCorrections);
  const [exported, setExported] = useState(false);
  const [hoverCorr, setHoverCorr] = useState(null);
  const [editIdx, setEditIdx] = useState(null);
  const [toast, setToast] = useState("");
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [analyzing, setAnalyzing] = useState(false);
  const [analysisProgress, setAnalysisProgress] = useState(0);
  const [query, setQuery] = useState("");
  const [hoveredSideItem, setHoveredSideItem] = useState(null);

  // page theme: light page area always; panels are dark gray metallic
  const pageBg = dark ? "#1b2123" : "#eef1f1";

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };
  const doLogin = () => { if (!email || !pass) { setAuthErr("Preencha todos os campos."); return; } setAuthErr(""); setAuthOpen(false); flash("Login realizado com sucesso"); };
  const doRegister = () => { if (!email || !pass) { setAuthErr("Preencha todos os campos."); return; } setAuthErr(""); setAuthMode("login"); flash("Conta criada — faça login"); };
  const runUpload = () => {
    setUploading(true); setProgress(0);
    const iv = setInterval(() => {
      setProgress((p) => {
        if (p >= 100) { clearInterval(iv); setUploading(false);
          const base = DOCUMENT_FIXTURES[0];
          const nextId = Date.now();
          setDocumentRecords((records) => [{ ...makeDocumentRecord(base), id: nextId, name: "Novo documento.pdf", type: "Contrato" }, ...records]);
          setScreen("home"); flash("Arquivo enviado"); return 100; }
        return p + 12;
      });
    }, 140);
  };
  const runAnalysis = () => {
    if (analyzing) return;
    setAnalyzing(true); setAnalysisProgress(0); setScreen("analysis");
    const iv = setInterval(() => {
      setAnalysisProgress((p) => {
        if (p >= 100) {
          clearInterval(iv);
          setTimeout(() => {
            setAnalyzing(false);
            setScreen("check");
            flash("Documento analisado");
          }, 220);
          return 100;
        }
        return p + 10;
      });
    }, 180);
  };
  const openScreen = (id) => {
    if (id === "edit") {
      setEditDraft(cloneDoc(doc));
      setEditDraftCorr(cloneCorrections(corr));
    }
    setScreen(id);
  };
  const selectDocument = (record, nextScreen = "edit") => {
    setActiveDocId(record.id);
    setDoc(cloneDoc(record.doc));
    setCorr(cloneCorrections(record.corrections));
    setFields(cloneFields(record.fields));
    setExported(record.exported);
    setHoverCorr(null);
    setEditIdx(null);
    setEditDraft(cloneDoc(record.doc));
    setEditDraftCorr(cloneCorrections(record.corrections));
    setScreen(nextScreen);
  };
  const updateActiveRecord = (updates) => {
    setDocumentRecords((records) => records.map((record) => record.id === activeDocId ? { ...record, ...updates } : record));
  };

  const sideItems = [
    { id: "check", icon: "check", label: "Verificação" },
    { id: "home", icon: "home", label: "Home" },
    { id: "search", icon: "search", label: "Busca Inteligente" },
    { id: "edit", icon: "pencil", label: "Edição" },
    { id: "upload", icon: "upload", label: "Upload" },
  ];
  const confColor = (c) => (c === "alto" ? GREEN : c === "medio" ? "#E0A23B" : RED);
  const trimmedQuery = query.trim();
  const searchText = getDocumentSearchText(doc, corr, exported);
  const searchMatches = countMatches(searchText, trimmedQuery);
  const searchActive = screen === "search";
  const pendingCount = corr.filter((c) => c.status === "pending").length;
  const decidedCount = corr.length - pendingCount;
  const correctionById = Object.fromEntries(corr.map((c) => [c.id, c]));
  const editCorrectionById = Object.fromEntries(editDraftCorr.map((c) => [c.id, c]));
  const setCorrectionStatus = (id, status) => {
    setCorr((items) => {
      const nextCorrections = items.map((item) => item.id === id ? { ...item, status } : item);
      updateActiveRecord({ corrections: cloneCorrections(nextCorrections), exported: false });
      return nextCorrections;
    });
    if (exported) setExported(false);
  };
  const confirmExport = () => {
    if (pendingCount) {
      flash("Revise todas as correções antes de exportar");
      return;
    }
    setExported(true);
    updateActiveRecord({ exported: true });
    flash("Documento exportado com correções aplicadas");
  };
  const setDraftMeta = (index, metaIndex, value) => {
    setEditDraft((draft) => ({
      ...draft,
      meta: draft.meta.map((item, i) => i === index ? item.map((part, j) => j === metaIndex ? value : part) : item),
    }));
  };
  const setDraftSectionHeading = (sectionIndex, value) => {
    setEditDraft((draft) => ({
      ...draft,
      sections: draft.sections.map((section, i) => i === sectionIndex ? { ...section, heading: value } : section),
    }));
  };
  const setDraftTextPart = (sectionIndex, partIndex, value) => {
    setEditDraft((draft) => ({
      ...draft,
      sections: draft.sections.map((section, i) => i === sectionIndex
        ? { ...section, body: section.body.map((part, j) => j === partIndex ? { ...part, text: value } : part) }
        : section),
    }));
  };
  const setDraftCorrectionText = (id, field, value) => {
    setEditDraftCorr((items) => items.map((item) => item.id === id ? { ...item, [field]: value } : item));
  };
  const resetEditDraft = () => {
    setEditDraft(cloneDoc(doc));
    setEditDraftCorr(cloneCorrections(corr));
    flash("Edição revertida");
  };
  const saveEditAndAnalyze = () => {
    if (analyzing) return;
    const nextDoc = cloneDoc(editDraft);
    const nextCorrections = cloneCorrections(editDraftCorr);
    setDoc(nextDoc);
    setCorr(nextCorrections);
    setExported(false);
    setHoverCorr(null);
    updateActiveRecord({ doc: nextDoc, corrections: nextCorrections, fields: cloneFields(fields), exported: false });
    runAnalysis();
  };
  const analysisSteps = ["Preparando documento", "Verificando ortografia", "Extraindo dados principais", "Calculando confiança da extração", "Montando resultado"];
  const analysisStep = analysisProgress <= 20 ? 0 : analysisProgress <= 40 ? 1 : analysisProgress <= 65 ? 2 : analysisProgress <= 85 ? 3 : 4;

  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,.15)", background: "rgba(255,255,255,.06)", color: "#fff", fontFamily: "inherit", fontSize: 14, outline: "none", boxSizing: "border-box" };
  const btnPrimary = { background: GREEN, color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" };
  const darkCard = { background: GRAY, borderRadius: 16, color: "#fff" };
  const mainPanelStyle = searchActive
    ? { position: "absolute", top: 72, left: 16, width: 360, maxWidth: sidebar ? "calc(100% - 104px)" : "calc(100% - 32px)", ...darkCard, overflow: "visible", boxShadow: "0 10px 30px rgba(0,0,0,.25)", zIndex: 30, pointerEvents: "auto" }
    : { position: "absolute", top: 72, left: 16, right: sidebar ? 72 : 16, bottom: 16, ...darkCard, overflow: "auto", boxShadow: "0 10px 30px rgba(0,0,0,.25)", pointerEvents: "auto" };

  return (
    <div style={{ position: "relative", minHeight: "100vh", background: pageBg, overflow: "hidden", color: GRAY }}>
      <BackgroundPage doc={doc} dark={dark} query={searchActive ? trimmedQuery : ""} searchActive={searchActive} corr={corr} exported={exported} hoverCorr={hoverCorr} setHoverCorr={setHoverCorr} />

      <div style={{ position: "absolute", top: 24, left: "50%", transform: "translateX(-50%)", width: "min(1040px, calc(100% - 48px))", height: "min(660px, calc(100vh - 48px))", zIndex: 20, pointerEvents: "none" }}>
      {/* launcher = green check */}
      {!extensionOpen && (
        <button title="Abrir Revis.AI" onClick={() => setExtensionOpen(true)}
          style={{ position: "absolute", top: 14, right: 14, zIndex: 50, width: 44, height: 44, borderRadius: 12, background: "#fff", border: "1px solid #d4dada", boxShadow: "0 6px 20px rgba(0,0,0,.18)", cursor: "pointer", display: "grid", placeItems: "center", pointerEvents: "auto" }}>
          <Check size={24} />
        </button>
      )}

      {extensionOpen && (
      <React.Fragment>
      {/* top bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 40, height: 56, background: GRAY, display: "flex", alignItems: "center", padding: "0 16px", boxShadow: "0 4px 18px rgba(0,0,0,.2)", pointerEvents: "auto" }}>
          <Wordmark onDark />
          <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", gap: 10, fontSize: 13, color: "#cfd6d6" }}>
            Barra Auxiliar
            <button onClick={() => setSidebar((v) => !v)}
              style={{ width: 42, height: 22, borderRadius: 12, border: "none", cursor: "pointer", background: sidebar ? GREEN : "rgba(255,255,255,.25)", position: "relative", transition: ".2s" }}>
              <span style={{ position: "absolute", top: 2, left: sidebar ? 22 : 2, width: 18, height: 18, borderRadius: "50%", background: "#fff", transition: ".2s" }} />
            </button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4, position: "relative" }}>

        </div>
      )}
      </React.Fragment>
      )}
      </div>
    </div>
  );
}

function EditableText({ value, onChange, style }) {
  return (
    <span
      contentEditable
      suppressContentEditableWarning
      onInput={(e) => onChange(e.currentTarget.textContent)}
      style={{ display: "inline", minWidth: 8, outline: "none", cursor: "text", whiteSpace: "pre-wrap", ...style }}>
      {value}
    </span>
  );
}
function DocumentSections({ sections, corrections, exported, query = "", hoverCorr, setHoverCorr, sectionStyle, headingStyle, paragraphStyle, editable = false, onHeadingChange, onTextChange, onCorrectionTextChange }) {
  return (
    <React.Fragment>
      {sections.map((section, sectionIndex) => (
        <section key={sectionIndex} style={sectionStyle}>
          <h2 style={headingStyle}>
            {editable
              ? <EditableText value={section.heading} onChange={(value) => onHeadingChange(sectionIndex, value)} />
              : <Hl q={query} text={section.heading} />}
          </h2>
          <p style={paragraphStyle}>
            <DocumentText parts={section.body} corrections={corrections} exported={exported} query={query} hoverCorr={hoverCorr} setHoverCorr={setHoverCorr} editable={editable} sectionIndex={sectionIndex} onTextChange={onTextChange} onCorrectionTextChange={onCorrectionTextChange} />
          </p>
        </section>
      ))}
    </React.Fragment>
  );
}
function DocumentText({ parts, corrections, exported, query, hoverCorr, setHoverCorr, editable, sectionIndex, onTextChange, onCorrectionTextChange }) {
  return (
    <React.Fragment>
      {parts.map((part, index) => part.correctionId
        ? <DocumentCorrectionText key={`${part.correctionId}-${index}`} correction={corrections[part.correctionId]} exported={exported} query={query} active={hoverCorr === part.correctionId} setHoverCorr={setHoverCorr} editable={editable} onCorrectionTextChange={onCorrectionTextChange} />
        : editable
          ? <EditableText key={index} value={part.text} onChange={(value) => onTextChange(sectionIndex, index, value)} />
          : <Hl key={index} q={query} text={part.text} />
      )}
    </React.Fragment>
  );
}
function DocumentCorrectionText({ correction, exported, query, active, setHoverCorr, editable = false, onCorrectionTextChange }) {
  const [localHover, setLocalHover] = useState(false);
  if (!correction) return null;
  const acceptedAfterExport = exported && correction.status === "accepted";
  const rejectedAfterExport = exported && correction.status === "rejected";
  const editableField = acceptedAfterExport ? "right" : "wrong";
  const visibleText = acceptedAfterExport ? correction.right : correction.wrong;
  const showOldText = acceptedAfterExport && localHover;
  const baseStyle = {
    position: "relative",
    borderRadius: 4,
    cursor: editable ? "text" : acceptedAfterExport ? "help" : "default",
    fontWeight: 700,
    padding: "1px 3px",
    transition: ".15s",
  };
  const stateStyle = acceptedAfterExport
    ? { background: active ? "rgba(84,174,132,.22)" : "rgba(84,174,132,.14)", borderBottom: `2px solid ${GREEN}`, color: "inherit" }
    : rejectedAfterExport
      ? { background: "transparent", borderBottom: "2px solid transparent", color: "inherit", fontWeight: 600 }
      : { background: active ? "rgba(226,87,76,.22)" : "rgba(226,87,76,.13)", borderBottom: `2px solid ${RED}`, color: RED, textDecoration: "underline wavy rgba(226,87,76,.75)", textUnderlineOffset: 3 };

  return (
    <span
      onMouseEnter={() => { setLocalHover(true); setHoverCorr(correction.id); }}
      onMouseLeave={() => { setLocalHover(false); setHoverCorr(null); }}
      style={{ ...baseStyle, ...stateStyle }}>
      {editable
        ? <EditableText value={visibleText} onChange={(value) => onCorrectionTextChange(correction.id, editableField, value)} style={{ fontWeight: "inherit" }} />
        : <Hl q={query} text={visibleText} />}
      {showOldText && (
        <span style={{ position: "absolute", left: "50%", bottom: "calc(100% + 8px)", transform: "translateX(-50%)", background: GRAY, color: "#fff", border: "1px solid rgba(255,255,255,.12)", borderRadius: 8, boxShadow: "0 8px 20px rgba(0,0,0,.28)", padding: "7px 9px", fontSize: 11, lineHeight: 1.2, whiteSpace: "nowrap", zIndex: 80, pointerEvents: "none", textDecoration: "none", fontWeight: 700 }}>
          Antes: {correction.wrong}
          <span style={{ position: "absolute", left: "50%", bottom: -5, transform: "translateX(-50%) rotate(45deg)", width: 10, height: 10, background: GRAY, borderRight: "1px solid rgba(255,255,255,.12)", borderBottom: "1px solid rgba(255,255,255,.12)" }} />
        </span>
      )}
    </span>
  );
}
function escapeRegExp(value) {
  return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
function countMatches(text, q) {
  const term = q.trim();
  if (!term) return 0;
  return (text.match(new RegExp(escapeRegExp(term), "gi")) || []).length;
}
function getDocumentSearchText(doc, corrections, exported) {
  const correctionById = Object.fromEntries(corrections.map((c) => [c.id, c]));
  const sectionText = doc.sections.flatMap((section) => [
    section.heading,
    ...section.body.map((part) => {
      if (!part.correctionId) return part.text;
      const correction = correctionById[part.correctionId];
      if (!correction) return "";
      return exported && correction.status === "accepted" ? correction.right : correction.wrong;
    }),
  ]);
  return [doc.title, doc.subtitle, ...doc.meta.flat(), ...sectionText].join(" ");
}
function BackgroundPage({ doc, dark, query, searchActive, corr, exported, hoverCorr, setHoverCorr }) {
  const surface = dark ? "#202729" : "#ffffff";
  const text = dark ? "#d7dddd" : GRAY;
  const muted = dark ? "#8f9b9b" : "#6b7474";
  const line = dark ? "rgba(255,255,255,.08)" : "#dce3e3";
  const correctionById = Object.fromEntries(corr.map((c) => [c.id, c]));
  const articleStyle = searchActive
    ? { width: "min(940px, calc(100% - 470px))", marginLeft: 430 }
    : { width: "min(1080px, calc(100% - 96px))", margin: "0 auto" };
  return (
    <div style={{ position: "absolute", inset: 0, padding: "88px 48px 48px", opacity: searchActive ? 0.92 : 0.58, pointerEvents: "auto", transition: ".2s", overflow: "hidden" }}>
      <article style={{ ...articleStyle, minHeight: "100%", background: surface, color: text, borderRadius: 10, boxShadow: dark ? "0 14px 40px rgba(0,0,0,.3)" : "0 14px 40px rgba(45,54,56,.12)", padding: 28 }}>
        <div style={{ color: GREEN, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: .4, marginBottom: 8 }}><Hl q={query} text={doc.subtitle} /></div>
        <h1 style={{ margin: 0, fontSize: 28, lineHeight: 1.18, fontWeight: 700 }}><Hl q={query} text={doc.title} /></h1>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, minmax(0, 1fr))", gap: 8, borderTop: `1px solid ${line}`, borderBottom: `1px solid ${line}`, padding: "14px 0", margin: "20px 0" }}>
          {doc.meta.map(([label, value]) => (
            <div key={label}>
              <div style={{ color: muted, fontSize: 11, marginBottom: 3 }}><Hl q={query} text={label} /></div>
              <div style={{ fontSize: 12, fontWeight: 700 }}><Hl q={query} text={value} /></div>
            </div>
          ))}
        </div>
        <DocumentSections sections={doc.sections} corrections={correctionById} exported={exported} query={query} hoverCorr={hoverCorr} setHoverCorr={setHoverCorr}
          sectionStyle={{ marginBottom: 18 }}
          headingStyle={{ fontSize: 16, margin: "0 0 6px", color: text }}
          paragraphStyle={{ margin: 0, color: muted, fontSize: 14, lineHeight: 1.7 }} />
      </article>
    </div>
  );
}
function Hl({ text, q }) {
  const term = q.trim();
  if (!term) return <span>{text}</span>;
  const parts = text.split(new RegExp(`(${escapeRegExp(term)})`, "gi"));
  return <span>{parts.map((p, i) =>
    p.toLowerCase() === term.toLowerCase()
      ? <mark key={i} style={{ background: GREEN, color: "#fff", borderRadius: 3, padding: "0 2px" }}>{p}</mark>
      : <span key={i}>{p}</span>
  )}</span>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<RevisAI />);
</script>
</body>
