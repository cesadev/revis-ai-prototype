<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revis.AI — Protótipo</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #c9cfcf; padding: 24px; }
  #root { max-width: 1040px; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const GREEN = "#54ae84";
const GRAY = "#2d3638";
const RED = "#E2574C";

// brand wordmark: Re ✓ is.AI  (check replaces the "v")
function Check({ size = 22, color = GREEN, stroke = 3 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 13l5 5L20 5" />
    </svg>
  );
}
function Wordmark({ scale = 1, onDark }) {
  const s = 22 * scale;
  return (
    <span style={{ fontFamily: "Poppins, sans-serif", fontWeight: 700, fontSize: 20 * scale, display: "inline-flex", alignItems: "center", color: onDark ? "#fff" : GRAY }}>
      Re<Check size={s} stroke={3.4} />is.<span style={{ color: GREEN }}>AI</span>
    </span>
  );
}

const I = {
  home: "M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5z",
  search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3",
  pencil: "M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z",
  upload: "M12 17V3M6 9l6-6 6 6M4 21h16",
  gear: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.7 19.4a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 6.7a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9.3A1.6 1.6 0 0 0 11 2.6V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8z",
  x: "M18 6L6 18M6 6l12 12",
  help: "M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01",
  user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
  chevron: "M9 18l6-6-6-6",
  edit: "M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
  file: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM14 2v6h6",
};
function Icon({ name, size = 18, color = "#000", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      <path d={I[name]} />
    </svg>
  );
}

const SEED_DOCS = [
  { id: 1, name: "Contrato nº 0428/2024", type: "Contrato", status: "Pendente" },
  { id: 2, name: "Ofício SEI 1192/2026", type: "Ofício", status: "Revisado" },
  { id: 3, name: "Edital de Licitação 07/2026", type: "Edital", status: "Revisado" },
];
const SEED_FIELDS = [
  { k: "Contratante", v: "Prefeitura do Recife", conf: "alto" },
  { k: "Cidade", v: "Recife", conf: "alto" },
  { k: "Nº do contrato", v: "0428/2024", conf: "alto" },
  { k: "Objeto", v: "Prestação de serviços de manutenção predial", conf: "medio" },
  { k: "Valor", v: "R$ 248.500,00", conf: "medio" },
  { k: "Vigência", v: "12 meses", conf: "alto" },
  { k: "CNPJ", v: "11.222.333/0001-44", conf: "baixo" },
];
const SEED_CORR = [
  { id: "c1", wrong: "Cidaede: Recife", right: "Cidade: Recife" },
  { id: "c2", wrong: "vigencia", right: "vigência" },
  { id: "c3", wrong: "prestassão", right: "prestação" },
];

function IconBtn({ children, onClick, hover = "rgba(255,255,255,.1)" }) {
  return (
    <button onClick={onClick}
      style={{ width: 34, height: 34, borderRadius: 8, border: "none", background: "transparent", cursor: "pointer", display: "grid", placeItems: "center" }}
      onMouseEnter={(e) => (e.currentTarget.style.background = hover)}
      onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
      {children}
    </button>
  );
}

function RevisAI() {
  const [dark, setDark] = useState(false);
  const [topOpen, setTopOpen] = useState(true);
  const [sidebar, setSidebar] = useState(true);
  const [screen, setScreen] = useState("check");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState("login");
  const [authErr, setAuthErr] = useState("");
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [docs, setDocs] = useState(SEED_DOCS);
  const [fields, setFields] = useState(SEED_FIELDS);
  const [corr, setCorr] = useState(SEED_CORR);
  const [hoverCorr, setHoverCorr] = useState(null);
  const [editIdx, setEditIdx] = useState(null);
  const [toast, setToast] = useState("");
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [query, setQuery] = useState("");

  // page theme: light page area always; panels are dark gray metallic
  const pageBg = dark ? "#1b2123" : "#eef1f1";

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };
  const doLogin = () => { if (!email || !pass) { setAuthErr("Preencha todos os campos."); return; } setAuthErr(""); setAuthOpen(false); flash("Login realizado com sucesso"); };
  const doRegister = () => { if (!email || !pass) { setAuthErr("Preencha todos os campos."); return; } setAuthErr(""); setAuthMode("login"); flash("Conta criada — faça login"); };
  const runUpload = () => {
    setUploading(true); setProgress(0);
    const iv = setInterval(() => {
      setProgress((p) => {
        if (p >= 100) { clearInterval(iv); setUploading(false);
          setDocs((d) => [{ id: Date.now(), name: "Novo documento.pdf", type: "Contrato", status: "Pendente" }, ...d]);
          setScreen("home"); flash("Arquivo enviado"); return 100; }
        return p + 12;
      });
    }, 140);
  };

  const sideItems = [
    { id: "check", icon: "check", label: "Verificação" },
    { id: "home", icon: "home", label: "Home" },
    { id: "search", icon: "search", label: "Busca Inteligente" },
    { id: "edit", icon: "pencil", label: "Edição" },
    { id: "upload", icon: "upload", label: "Upload" },
  ];
  const confColor = (c) => (c === "alto" ? GREEN : c === "medio" ? "#E0A23B" : RED);

  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,.15)", background: "rgba(255,255,255,.06)", color: "#fff", fontFamily: "inherit", fontSize: 14, outline: "none", boxSizing: "border-box" };
  const btnPrimary = { background: GREEN, color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" };
  const darkCard = { background: GRAY, borderRadius: 16, color: "#fff" };

  return (
    <div style={{ position: "relative", minHeight: 660, background: pageBg, borderRadius: 12, overflow: "hidden", color: GRAY }}>
      {/* fake background page */}
      <div style={{ position: "absolute", inset: 0, padding: 32, opacity: 0.55, pointerEvents: "none" }}>
        <div style={{ height: 40, width: "55%", background: dark ? "#2a3133" : "#dde3e3", borderRadius: 6, marginBottom: 20 }} />
        {[...Array(9)].map((_, i) => (
          <div key={i} style={{ height: 12, width: `${92 - i * 6}%`, background: dark ? "#232a2c" : "#e4e9e9", borderRadius: 4, marginBottom: 12 }} />
        ))}
      </div>

      {/* launcher = green check */}
      <button onClick={() => setTopOpen((v) => !v)}
        style={{ position: "absolute", top: 14, right: 14, zIndex: 50, width: 44, height: 44, borderRadius: 12, background: "#fff", border: "1px solid #d4dada", boxShadow: "0 6px 20px rgba(0,0,0,.18)", cursor: "pointer", display: "grid", placeItems: "center" }}>
        <Check size={24} />
      </button>

      {/* top bar */}
      {topOpen && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 40, height: 56, background: GRAY, display: "flex", alignItems: "center", padding: "0 16px", boxShadow: "0 4px 18px rgba(0,0,0,.2)" }}>
          <Wordmark onDark />
          <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", gap: 10, fontSize: 13, color: "#cfd6d6" }}>
            Barra Auxiliar
            <button onClick={() => setSidebar((v) => !v)}
              style={{ width: 42, height: 22, borderRadius: 12, border: "none", cursor: "pointer", background: sidebar ? GREEN : "rgba(255,255,255,.25)", position: "relative", transition: ".2s" }}>
              <span style={{ position: "absolute", top: 2, left: sidebar ? 22 : 2, width: 18, height: 18, borderRadius: "50%", background: "#fff", transition: ".2s" }} />
            </button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4, position: "relative" }}>
            <IconBtn onClick={() => { setSettingsOpen((v) => !v); setAuthOpen(false); }}><Icon name="gear" color={GREEN} /></IconBtn>
            <IconBtn><Icon name="help" color="#cfd6d6" /></IconBtn>
            <IconBtn onClick={() => { setAuthOpen((v) => !v); setSettingsOpen(false); }}><Icon name="user" color="#cfd6d6" /></IconBtn>
            <IconBtn onClick={() => setTopOpen(false)}><Icon name="x" color="#cfd6d6" /></IconBtn>

            {settingsOpen && (
              <div style={{ position: "absolute", top: 44, right: 0, width: 190, ...darkCard, borderRadius: 12, boxShadow: "0 8px 24px rgba(0,0,0,.3)", padding: 8, zIndex: 60 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 6px", fontSize: 14 }}>
                  Modo escuro
                  <button onClick={() => setDark((v) => !v)}
                    style={{ width: 38, height: 20, borderRadius: 12, border: "none", cursor: "pointer", background: dark ? GREEN : "rgba(255,255,255,.25)", position: "relative" }}>
                    <span style={{ position: "absolute", top: 2, left: dark ? 20 : 2, width: 16, height: 16, borderRadius: "50%", background: "#fff", transition: ".2s" }} />
                  </button>
                </div>
                <div style={{ padding: "8px 6px", fontSize: 14, color: "#aab2b2" }}>Idioma · Sobre</div>
              </div>
            )}

            {authOpen && (
              <div style={{ position: "absolute", top: 44, right: 0, width: 250, ...darkCard, borderRadius: 12, boxShadow: "0 8px 24px rgba(0,0,0,.3)", padding: 16, zIndex: 60 }}>
                <div style={{ fontWeight: 700, marginBottom: 12 }}>{authMode === "login" ? "Entrar" : "Criar conta"}</div>
                <div style={{ display: "grid", gap: 8 }}>
                  <input placeholder="E-mail" style={inputStyle} value={email} onChange={(e) => setEmail(e.target.value)} />
                  <input placeholder="Senha" type="password" style={inputStyle} value={pass} onChange={(e) => setPass(e.target.value)} />
                  {authMode === "register" && <input placeholder="Nome de usuário" style={inputStyle} />}
                  {authMode === "login" && (
                    <label style={{ fontSize: 13, color: "#aab2b2", display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="checkbox" /> Lembrar de mim
                    </label>
                  )}
                  {authErr && <div style={{ color: RED, fontSize: 12 }}>{authErr}</div>}
                  <button style={btnPrimary} onClick={authMode === "login" ? doLogin : doRegister}>
                    {authMode === "login" ? "Entrar" : "Cadastrar"}
                  </button>
                  <button onClick={() => { setAuthMode(authMode === "login" ? "register" : "login"); setAuthErr(""); }}
                    style={{ background: "none", border: "none", color: GREEN, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                    {authMode === "login" ? "Criar conta" : "Já tenho conta"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* sidebar */}
      {sidebar && (
        <div style={{ position: "absolute", top: topOpen ? 72 : 70, right: 14, zIndex: 35, background: GRAY, borderRadius: 16, padding: 8, display: "flex", flexDirection: "column", gap: 6, boxShadow: "0 6px 20px rgba(0,0,0,.25)" }}>
          {sideItems.map(({ id, icon, label }) => (
            <button key={id} title={label} onClick={() => setScreen(id)}
              style={{ width: 42, height: 42, borderRadius: 10, border: "none", cursor: "pointer", background: screen === id ? GREEN : "transparent", display: "grid", placeItems: "center" }}>
              {icon === "check"
                ? <Check size={22} color="#fff" />
                : <Icon name={icon} size={20} color="#fff" />}
            </button>
          ))}
        </div>
      )}

      {/* main panel */}
      <div style={{ position: "absolute", top: topOpen ? 72 : 16, left: 16, right: sidebar ? 72 : 16, bottom: 16, ...darkCard, overflow: "auto", boxShadow: "0 10px 30px rgba(0,0,0,.25)" }}>

        {screen === "home" && (
          <div style={{ padding: 24 }}>
            <h2 style={{ margin: "0 0 4px" }}>Olá, Bruno 👋</h2>
            <p style={{ color: "#aab2b2", marginTop: 0, fontSize: 13 }}>Configurações avançadas e documentos registrados na empresa.</p>
            <div style={{ display: "grid", gap: 10, marginBottom: 16 }}>
              {docs.map((d) => (
                <div key={d.id} onClick={() => setScreen("check")}
                  style={{ background: "rgba(255,255,255,.06)", borderRadius: 12, padding: 14, display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
                  <Icon name="file" size={20} color={GREEN} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{d.name}</div>
                    <div style={{ fontSize: 12, color: "#aab2b2" }}>{d.type}</div>
                  </div>
                  <span style={{ fontSize: 12, fontWeight: 600, color: d.status === "Revisado" ? GREEN : "#E0A23B" }}>{d.status}</span>
                  <Icon name="chevron" size={16} color="#aab2b2" />
                </div>
              ))}
            </div>
            <div onClick={() => setScreen("upload")}
              style={{ border: `2px dashed ${GREEN}`, borderRadius: 12, padding: 18, textAlign: "center", color: GREEN, fontWeight: 600, cursor: "pointer" }}>
              + Enviar novo documento
            </div>
          </div>
        )}

        {screen === "search" && (
          <div style={{ padding: 24 }}>
            <h3 style={{ marginTop: 0 }}>Busca Inteligente</h3>
            <p style={{ color: "#aab2b2", fontSize: 13, marginTop: 0 }}>Busque por palavras-chave com integração aos modelos de documento da empresa.</p>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16 }}>
              <input placeholder="ex.: Recife" style={inputStyle} value={query} onChange={(e) => setQuery(e.target.value)} />
              <span style={{ fontSize: 13, color: "#aab2b2", whiteSpace: "nowrap" }}>{query ? "1/14" : "0/0"}</span>
            </div>
            <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 12, padding: 16, fontSize: 14, lineHeight: 1.8 }}>
              <Hl q={query} text="O presente contrato é celebrado entre a Prefeitura do Recife. A cidade de Recife figura como contratante, com sede em Recife, conforme registro." />
            </div>
          </div>
        )}

        {screen === "edit" && (
          <div style={{ padding: 24 }}>
            <p style={{ color: "#aab2b2", fontSize: 13, marginTop: 0 }}>Corrija erros, faça marcações, crie cópias e outras opções de edição.</p>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              {["B", "I", "↶"].map((x) => (
                <button key={x} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid rgba(255,255,255,.15)", background: "rgba(255,255,255,.06)", cursor: "pointer", color: "#fff", fontWeight: 700 }}>{x}</button>
              ))}
            </div>
            <div contentEditable suppressContentEditableWarning
              style={{ background: "rgba(255,255,255,.06)", borderRadius: 12, minHeight: 280, padding: 16, fontSize: 14, lineHeight: 1.7, outline: "none", color: "#fff" }}>
              PREFEITURA DO RECIFE — Contrato de Prestação de Serviços nº 0428/2024. Edite o texto livremente antes de analisar...
            </div>
            <button style={{ ...btnPrimary, marginTop: 14 }} onClick={() => { setScreen("check"); flash("Documento analisado"); }}>
              Salvar e analisar
            </button>
          </div>
        )}

        {screen === "upload" && (
          <div style={{ padding: 24 }}>
            <p style={{ color: "#aab2b2", fontSize: 13, marginTop: 0 }}>Faça upload de seus documentos ou use as ferramentas em arquivos abertos no navegador.</p>
            <div style={{ border: "2px dashed rgba(255,255,255,.2)", borderRadius: 12, padding: 48, textAlign: "center" }}>
              {uploading ? (
                <React.Fragment>
                  <Icon name="upload" size={28} color={GREEN} style={{ animation: "spin 1s linear infinite" }} />
                  <div style={{ marginTop: 14, height: 8, background: "rgba(255,255,255,.15)", borderRadius: 6, overflow: "hidden" }}>
                    <div style={{ width: `${progress}%`, height: "100%", background: GREEN, transition: ".1s" }} />
                  </div>
                  <p style={{ color: "#aab2b2", fontSize: 13 }}>Processando... {progress}%</p>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <Icon name="upload" size={32} color={GREEN} />
                  <p style={{ fontWeight: 600 }}>Arraste um PDF aqui ou clique para selecionar</p>
                  <button style={btnPrimary} onClick={runUpload}>Selecionar arquivo</button>
                </React.Fragment>
              )}
            </div>
          </div>
        )}

        {screen === "check" && (
          <div style={{ display: "flex", flexDirection: "column", height: "100%", padding: 18, gap: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: GREEN, display: "grid", placeItems: "center", color: "#fff", fontWeight: 700 }}>B</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13 }}>Bruno (Revisor)</div>
                <div style={{ fontSize: 12, color: "#aab2b2" }}>Tipo: Contrato</div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 14, flex: 1, minHeight: 0 }}>
              {/* left: corrected PDF */}
              <div style={{ flex: 1.2, background: "rgba(255,255,255,.04)", borderRadius: 16, padding: 18, overflow: "auto" }}>
                <div style={{ fontWeight: 700, marginBottom: 10 }}>PDF analisado corrigido</div>
                <div style={{ fontSize: 13.5, lineHeight: 1.8 }}>
                  <p>Contrato de <Spell on={hoverCorr === "c3"}>prestassão</Spell> de serviços firmado pela Prefeitura do Recife.</p>
                  <p>Endereço — <Spell on={hoverCorr === "c1"}>Cidaede: Recife</Spell>, conforme cadastro municipal.</p>
                  <p>Com <Spell on={hoverCorr === "c2"}>vigencia</Spell> de 12 meses e valor global de R$ 248.500,00.</p>
                </div>
              </div>

              {/* right column */}
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 14, minHeight: 0 }}>
                {/* corrections */}
                <div style={{ background: "rgba(255,255,255,.04)", borderRadius: 16, padding: 14, overflow: "auto", maxHeight: 230 }}>
                  <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 13 }}>Correções · {corr.length} pendente(s)</div>
                  <div style={{ display: "grid", gap: 8 }}>
                    {corr.map((c) => (
                      <div key={c.id} onMouseEnter={() => setHoverCorr(c.id)} onMouseLeave={() => setHoverCorr(null)}
                        style={{ background: "rgba(0,0,0,.25)", borderRadius: 10, padding: 10, fontSize: 13 }}>
                        <div style={{ color: RED, marginBottom: 2 }}>Texto errado: {c.wrong}</div>
                        <div style={{ color: GREEN, marginBottom: 8 }}>Texto certo: {c.right}</div>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => setCorr((x) => x.filter((y) => y.id !== c.id))}
                            style={{ flex: 1, padding: 6, borderRadius: 6, border: "none", background: GREEN, color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Aceitar</button>
                          <button onClick={() => setCorr((x) => x.filter((y) => y.id !== c.id))}
                            style={{ flex: 1, padding: 6, borderRadius: 6, border: `1px solid ${RED}`, background: "transparent", color: RED, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Rejeitar</button>
                        </div>
                      </div>
                    ))}
                    {!corr.length && <div style={{ fontSize: 13, color: GREEN }}>✓ Tudo revisado</div>}
                  </div>
                </div>

                {/* extracted info */}
                <div style={{ background: "rgba(255,255,255,.04)", borderRadius: 16, padding: 14, overflow: "auto", flex: 1 }}>
                  <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 13 }}>Informações sobre o documento</div>
                  <div style={{ display: "grid", gap: 6 }}>
                    {fields.map((f, i) => (
                      <div key={f.k} style={{ background: "rgba(0,0,0,.25)", borderRadius: 8, padding: 8, fontSize: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ color: "#aab2b2" }}>{f.k}</span>
                          <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span title={`Confiança: ${f.conf}`} style={{ width: 8, height: 8, borderRadius: "50%", background: confColor(f.conf) }} />
                            <span style={{ cursor: "pointer", display: "grid", placeItems: "center" }} onClick={() => setEditIdx(editIdx === i ? null : i)}>
                              <Icon name="edit" size={13} color="#aab2b2" />
                            </span>
                          </span>
                        </div>
                        {editIdx === i ? (
                          <input autoFocus value={f.v} style={{ ...inputStyle, marginTop: 4, padding: "4px 8px", fontSize: 13 }}
                            onChange={(e) => setFields((arr) => arr.map((x, j) => j === i ? { ...x, v: e.target.value } : x))}
                            onBlur={() => setEditIdx(null)} />
                        ) : (
                          <div style={{ fontWeight: 600, marginTop: 2 }}>{f.v}</div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <button style={btnPrimary} onClick={() => flash("Documento exportado")}>Confirmar e exportar</button>
          </div>
        )}
      </div>

      {toast && (
        <div style={{ position: "absolute", bottom: 20, left: "50%", transform: "translateX(-50%)", zIndex: 70, background: GREEN, color: "#fff", padding: "10px 18px", borderRadius: 10, fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 8, boxShadow: "0 8px 24px rgba(0,0,0,.3)" }}>
          <Check size={16} color="#fff" /> {toast}
        </div>
      )}
    </div>
  );
}

function Spell({ children, on }) {
  return (
    <span style={{ textDecoration: "underline wavy #E2574C", textUnderlineOffset: 3,
      background: on ? "rgba(224,162,59,.45)" : "transparent", borderRadius: 3, padding: on ? "0 2px" : 0 }}>{children}</span>
  );
}
function Hl({ text, q }) {
  if (!q) return <span>{text}</span>;
  const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"));
  return <span>{parts.map((p, i) =>
    p.toLowerCase() === q.toLowerCase()
      ? <mark key={i} style={{ background: GREEN, color: "#fff", borderRadius: 3, padding: "0 2px" }}>{p}</mark>
      : <span key={i}>{p}</span>
  )}</span>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<RevisAI />);
</script>
</body>
</html>
